baseURL: 'https://mingxinwang.com'
languageCode: 'zh-cn'
title: 'MingXin Wang'
theme: PaperMod

params:
  env: production
  title: '我的博客'
  description: '个人技术博客 - 分享技术、生活与思考'
  mainSections: ['posts']
  images: []  # 全局图片配置，设为空数组避免模板错误
    # useCDN: true # 生产环境设为true使用ImgBB CDN (已在cdnimage shortcode中处理)
    # cdnBase: "https://i.ibb.co/"  # ImgBB CDN基础URL（会根据实际URL自动调整）
  
  # 首页配置
  homeInfoParams:
    Title: "欢迎来到我的博客"
    Content: "分享技术、生活与思考"
  
  # 社交链接
  socialIcons:
    - name: github
      url: "https://github.com/Cosmopolition"
    - name: email
      url: "peer2peer.wang@gmail.com"
  
  # 主题配置
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

# 菜单配置
menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 10
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 40
    - identifier: resume
      name: 简历
      url: /resume/
      weight: 50

# 输出格式
outputs:
  home:
    - HTML
    - RSS
    - JSON

