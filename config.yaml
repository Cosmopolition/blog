baseURL: 'https://mingxinwang.com'
languageCode: 'zh-cn'
title: 'MingXin Wang'
theme: PaperMod

params:
  env: production
  title: '我的博客'
  description: '个人技术博客 - 分享技术、生活与思考'
  mainSections: ['posts']
  images: []  # 全局图片配置，设为空数组避免模板错误
    # useCDN: true # 生产环境设为true使用ImgBB CDN (已在cdnimage shortcode中处理)
    # cdnBase: "https://i.ibb.co/"  # ImgBB CDN基础URL（会根据实际URL自动调整）
  
  # 首页布局模式 - 使用 Profile Mode (左侧固定 + 右侧内容)
  profileMode:
    enabled: true
    title: "MingXin Wang"
    imageUrl: "/images/avatar.jpg"  # 需要上传头像到 static/images/ 目录
    imageWidth: 150
    imageHeight: 150
    subtitle: "分享技术、生活与思考"
    buttons:
      - name: 博客
        url: /
      - name: 关于
        url: /about/
      - name: 归档
        url: /archives/
      - name: 标签
        url: /tags/
  
  # 社交链接
  socialIcons:
    - name: github
      url: "https://github.com/Cosmopolition"
    - name: email
      url: "peer2peer.wang@gmail.com"
  
  # 主题配置
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false  # 启用评论设置为 true

  # SEO 搜索引擎验证（请替换为您在各平台的验证码）
  analytics:
    google:
      SiteVerificationTag: "juUaiINixn4jtpMF1IBJrQ5Cqq3mrilA7ECVkQnCsuQ"
    bing:
      SiteVerificationTag: ""  # Bing Webmaster 验证码
    # 百度搜索资源平台需要 CNAME 验证，请使用手动方式

  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

# 菜单配置
menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 10
    - identifier: about
      name: 关于
      url: /about/
      weight: 15
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 40

# 输出格式
outputs:
  home:
    - HTML
    - RSS
    - JSON

