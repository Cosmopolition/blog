<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>开发者工具集</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .header p {
      color: #9ca3af;
      font-size: 16px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .tool-card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
      border: 1px solid rgba(55, 65, 81, 0.6);
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tool-card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                  0 0 30px rgba(56, 189, 248, 0.1);
    }

    .tool-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .tool-card:nth-child(1) .tool-icon {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(22, 163, 74, 0.2));
    }

    .tool-card:nth-child(2) .tool-icon {
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(59, 130, 246, 0.2));
    }

    .tool-card:nth-child(3) .tool-icon {
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(139, 92, 246, 0.2));
    }

    .tool-card:nth-child(4) .tool-icon {
      background: linear-gradient(135deg, rgba(251, 146, 60, 0.2), rgba(249, 115, 22, 0.2));
    }

    .tool-title {
      font-size: 18px;
      font-weight: 600;
      color: #f9fafb;
    }

    .tool-desc {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.6;
      flex: 1;
    }

    .tool-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.15);
      color: #7dd3fc;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    .tag.soon {
      background: rgba(251, 191, 36, 0.15);
      color: #fcd34d;
      border-color: rgba(251, 191, 36, 0.3);
    }

    .footer {
      text-align: center;
      margin-top: 48px;
      color: #6b7280;
      font-size: 13px;
    }

    .footer a {
      color: #38bdf8;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>开发者工具集</h1>
      <p>高效开发小工具集合，所有处理都在浏览器本地完成</p>
    </div>

    <div class="tools-grid">
      <a href="/tools/code-compress/" class="tool-card">
        <div class="tool-icon">📦</div>
        <div class="tool-title">代码压缩器</div>
        <div class="tool-desc">为软著整理源码，删除空行、注释、import 导包和 print 调试语句，压缩多余空格</div>
        <div class="tool-tags">
          <span class="tag">Dart / Flutter</span>
          <span class="tag">软著</span>
        </div>
      </a>

      <a href="#" class="tool-card" style="opacity: 0.6; cursor: not-allowed;">
        <div class="tool-icon">✨</div>
        <div class="tool-title">JSON 格式化</div>
        <div class="tool-desc">JSON 数据格式化、压缩、语法高亮，支持错误检测</div>
        <div class="tool-tags">
          <span class="tag soon">即将上线</span>
        </div>
      </a>

      <a href="#" class="tool-card" style="opacity: 0.6; cursor: not-allowed;">
        <div class="tool-icon">🔗</div>
        <div class="tool-title">URL 编解码</div>
        <div class="tool-desc">URL 参数编解码，中文特殊字符处理，支持批量操作</div>
        <div class="tool-tags">
          <span class="tag soon">即将上线</span>
        </div>
      </a>

      <a href="#" class="tool-card" style="opacity: 0.6; cursor: not-allowed;">
        <div class="tool-icon">🔒</div>
        <div class="tool-title">Base64 编解码</div>
        <div class="tool-desc">Base64 字符串编解码，支持文件和文本</div>
        <div class="tool-tags">
          <span class="tag soon">即将上线</span>
        </div>
      </a>
    </div>

    <div class="footer">
      <p>工具运行于浏览器本地 · 无需上传 · 保护隐私</p>
      <p style="margin-top: 8px;"><a href="/">← 返回博客</a></p>
    </div>
  </div>
</body>
</html>
