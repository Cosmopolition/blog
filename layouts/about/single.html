{{- define "main" }}

<article class="post-single about-page">
  <header class="about-header">
    <h1 class="about-title">{{ .Title }}</h1>
    {{- if .Description }}
    <div class="about-description">
      {{ .Description }}
    </div>
    {{- end }}
  </header>

  {{- if .Content }}
  <div class="post-content about-content">
    {{- if not (.Param "disableAnchoredHeadings") }}
    {{- partial "anchored_headings.html" .Content -}}
    {{- else }}{{ .Content }}{{ end }}
  </div>
  {{- end }}
</article>

<style>
.about-page {
  max-width: 720px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

.about-header {
  text-align: center;
  margin-bottom: 3rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}

.about-title {
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.about-description {
  font-size: 1.25rem;
  color: var(--secondary);
}

.about-content h2 {
  font-size: 1.5rem;
  margin-top: 2.5rem;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--primary);
  display: inline-block;
}

.about-content h3 {
  font-size: 1.25rem;
  margin-top: 1.5rem;
  margin-bottom: 0.75rem;
  color: var(--primary);
}

.about-content p {
  line-height: 1.8;
  margin-bottom: 1rem;
}

.about-content ul {
  list-style: none;
  padding-left: 0;
}

.about-content ul li {
  padding: 0.5rem 0;
  padding-left: 1.5rem;
  position: relative;
}

.about-content ul li::before {
  content: "→";
  position: absolute;
  left: 0;
  color: var(--primary);
}

.about-content strong {
  color: var(--primary);
}

.about-content a {
  color: var(--primary);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
}

.about-content a:hover {
  border-bottom-color: var(--primary);
}

/* 产品卡片 */
.about-content .product-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin: 1.5rem 0;
}

.product-card .product-status {
  display: inline-block;
  padding: 0.25rem 0.75rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
}

.product-card .product-status.live {
  background: rgba(34, 197, 94, 0.2);
  color: #22c55e;
}

.product-card .product-status.dev {
  background: rgba(251, 191, 36, 0.2);
  color: #f59e0b;
}

/* 联系我区域 */
.contact-section {
  text-align: center;
  padding: 2rem;
  background: var(--card-bg);
  border-radius: 12px;
  margin-top: 2rem;
}

.contact-section a {
  display: inline-block;
  padding: 0.75rem 1.5rem;
  background: var(--primary);
  color: white;
  border-radius: 8px;
  margin: 0.5rem;
  transition: transform 0.2s, opacity 0.2s;
}

.contact-section a:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}
</style>

{{- end }}
