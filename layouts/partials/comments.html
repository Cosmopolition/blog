{{- /* Giscus 评论系统配置 */ -}}
{{- /* 请访问 https://giscus.app 配置并获取你的专属参数 */ -}}
{{- /* 配置完成后替换下方的 data-repo, data-repo-id, data-category, data-category-id */ -}}

{{- if site.Params.comments -}}
<div class="giscus-container" style="margin-top: 2rem; padding: 1rem; border-top: 1px solid var(--border);">
    <script src="https://giscus.app/client.js"
            data-repo="YOUR_GITHUB_USERNAME/YOUR_REPO_NAME"
            data-repo-id="YOUR_REPO_ID"
            data-category="Announcements"
            data-category-id="YOUR_CATEGORY_ID"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="preferred_color_scheme"
            data-lang="zh-CN"
            crossorigin="anonymous"
            async>
    </script>
</div>
{{- end -}}
